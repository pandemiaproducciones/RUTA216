<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUTA216 v1.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #121212; /* Fondo más oscuro para resaltar */
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background: #1e1e1e;
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.7);
            width: 85%;
            max-width: 350px;
            text-align: center;
            border: 1px solid #333;
        }
        h1 {
            font-size: 2rem;
            letter-spacing: 4px;
            margin-bottom: 2rem;
            color: #ffffff;
            font-weight: 700;
        }
        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 0.6rem;
            color: #888;
            letter-spacing: 1px;
        }
        input {
            width: 100%;
            padding: 14px;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 10px;
            color: white;
            font-family: 'Montserrat', sans-serif;
            box-sizing: border-box;
            font-size: 1rem;
            outline: none;
            transition: border 0.3s;
        }
        input:focus {
            border: 1px solid #ffffff;
        }
        button {
            width: 100%;
            padding: 16px;
            background: #ffffff;
            color: #000000;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 1rem;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        button:active {
            transform: scale(0.96);
            background: #cccccc;
        }
        button:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
        }
        #mensaje {
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: #ff4d4d;
            font-weight: 400;
            min-height: 1.2rem;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h1>RUTA 216</h1>
        <form id="formLogin">
            <div class="input-group">
                <label>USUARIO</label>
                <input type="text" id="user" required spellcheck="false">
            </div>
            <div class="input-group">
                <label>CONTRASEÑA</label>
                <input type="password" id="pass" required>
            </div>
            <button type="submit" id="btnEntrar">ENTRAR</button>
        </form>
        <div id="mensaje"></div>
    </div>

    <script>
        const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbxWsuKmDFtvIQ9Flp-YZYCrfSGoHWzLmRNH_vXaf_KA0MBjw-JapsfPyr49lNXvWHE2/exec";

        document.getElementById('formLogin').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnEntrar');
            const msg = document.getElementById('mensaje');
            
            msg.innerText = "";
            btn.innerText = "VERIFICANDO...";
            btn.disabled = true;

            const datos = {
                action: "login",
                usuario: document.getElementById('user').value,
                contrasena: document.getElementById('pass').value
            };

            // Usamos 'no-cors' no es posible para leer JSON, usamos el modo normal
            // Pero con una pequeña trampa de redirección de Google
            fetch(URL_SCRIPT, {
                method: "POST",
                mode: "no-cors", // Intentamos enviar, pero no-cors no permite leer respuesta
                body: JSON.stringify(datos)
            });

            // Re-intentamos con el método estándar para obtener la respuesta real
            fetch(URL_SCRIPT, {
                method: "POST",
                body: JSON.stringify(datos)
            })
            .then(res => res.json())
            .then(response => {
                if (response.result === "success") {
                    localStorage.setItem('session_ruta216', JSON.stringify(response));
                    localStorage.setItem('user_ruta216', datos.usuario);
                    msg.style.color = "#4dff88";
                    msg.innerText = "¡BIENVENIDO/A, " + response.nombre_real.toUpperCase() + "!";
                    
                    // Pequeña pausa para que vean el saludo antes de pasar a la ventana 2
                    setTimeout(() => {
                        alert("Acceso concedido. Preparando ventana de estudio...");
                        // Próximamente: window.location.href = "estudio.html";
                    }, 1000);
                } else {
                    msg.style.color = "#ff4d4d";
                    msg.innerText = "DATOS INCORRECTOS. REVISA MAYÚSCULAS.";
                    btn.innerText = "ENTRAR";
                    btn.disabled = false;
                }
            })
            .catch(error => {
                console.error(error);
                msg.style.color = "#ff4d4d";
                msg.innerText = "ERROR DE CONEXIÓN. REVISA TU INTERNET.";
                btn.innerText = "ENTRAR";
                btn.disabled = false;
            });
        });
    </script>
</body>
</html>
